<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1a237e" />
  <meta name="description" content="每日早起脑力操 — 五分钟，三关小游戏，轻松打卡" />
  <title>每日早起脑力操</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- 首页 -->
    <section id="screen-home" class="screen active" aria-label="首页">
      <header class="hero">
        <p class="eyebrow">早上好</p>
        <h1>每日早起脑力操</h1>
        <p class="sub">每天约 5 分钟 · 三关小游戏 · 轻松动动脑</p>
      </header>
      <div class="streak-card" role="status">
        <span class="streak-icon" aria-hidden="true">🔥</span>
        <div>
          <p class="streak-label">连续打卡</p>
          <p class="streak-value"><span id="streak-days">0</span> 天</p>
        </div>
      </div>
      <p class="hint" id="home-hint"></p>
      <div class="mode-block" role="group" aria-label="使用方式">
        <p class="mode-label">怎么玩更方便？（可随时改）</p>
        <div class="mode-grid">
          <button type="button" class="mode-option" id="mode-standard" data-mode="standard" aria-pressed="false">
            <span class="mode-emoji" aria-hidden="true">👀</span>
            <span class="mode-title">我能看字</span>
            <span class="mode-sub">自己看、自己填</span>
          </button>
          <button type="button" class="mode-option" id="mode-assisted" data-mode="assisted" aria-pressed="false">
            <span class="mode-emoji" aria-hidden="true">🔊</span>
            <span class="mode-title">听语音、少打字</span>
            <span class="mode-sub">题目会念出来，多点选</span>
          </button>
        </div>
      </div>
      <button type="button" class="btn btn-primary btn-xl" id="btn-start">开始今日脑力操</button>
      <div class="reminder-row">
        <label class="check-label">
          <input type="checkbox" id="reminder-toggle" />
          <span>早上 7:00–9:00 用浏览器提醒一下我</span>
        </label>
        <p class="reminder-note" id="reminder-status"></p>
      </div>
    </section>

    <!-- 关卡进行中 -->
    <section id="screen-play" class="screen" aria-live="polite">
      <div class="progress-bar" aria-hidden="true">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <p class="level-tag" id="level-tag">第 1 / 3 关</p>
      <div id="game-root"></div>
    </section>

    <!-- 完成页 -->
    <section id="screen-done" class="screen">
      <div class="done-inner">
        <p class="done-emoji" aria-hidden="true">🌅</p>
        <h2>今天也完成啦</h2>
        <p class="done-msg">动动脑，一天更精神。没有对错，来了就好。</p>
        <p class="streak-done">已连续打卡 <strong id="streak-done-num">0</strong> 天</p>
        <button type="button" class="btn btn-primary btn-xl" id="btn-share">分享给子女看看</button>
        <p class="share-fallback" id="share-fallback" hidden></p>
        <button type="button" class="btn btn-ghost" id="btn-home">返回首页</button>
      </div>
    </section>
  </div>
  <script src="js/seed.js"></script>
  <script src="js/games.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
